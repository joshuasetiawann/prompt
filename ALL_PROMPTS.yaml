    Brand style: analytical, vibrant, marketing-savvy. Colors: indigo, coral, off-white. A channel ROI overview with an attribution-model comparison and a conversion-path explorer. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

