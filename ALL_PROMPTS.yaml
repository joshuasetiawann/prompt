    - Revenue allocation across touchpoints per the selected attribution model
    - ROAS, CPA, and conversion-rate metrics by channel and campaign
    - Funnel performance reporting across stages
    - Budget-vs-actual tracking with pacing and overspend flags
    - Side-by-side attribution model comparison
    - Scheduled report generation and delivery via email/export
    - Multi-touch conversion path explorer

