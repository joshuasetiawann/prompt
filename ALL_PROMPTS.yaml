    APP
    Name: ShiftMesh Employee Shift Scheduling System
    Type: Employee Shift Scheduling System (Workforce Scheduling)
    Target users: shift managers who build rotas around availability and coverage rules and hourly staff who set availability and request swaps and time off.
    Business goal: Let managers build staff rotas around availability and coverage rules while employees request shift swaps and time off, flagging conflicts and projecting labor cost.

    BRAND & DESIGN
    Brand style: organized, energetic, dependable. Colors: deep teal, warm coral, light grey. A weekly drag-and-drop rota grid with a coverage heatmap and a running labor-cost bar. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

    TECH STACK
    - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
    - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
    - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
    - Zod and React Hook Form for both client-side and server-side validation
    - Vercel-ready and Docker-ready

    PAGES / SCREENS
    1. Dashboard with this week's coverage and pending requests
