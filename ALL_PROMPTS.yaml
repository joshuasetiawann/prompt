    3. My schedule with shift list and calendar
    4. Availability editor
    5. Shift swap marketplace and requests
    6. Time-off requests
    7. Labor cost and coverage reports
    8. Auth (sign in / register)
    9. Admin: locations, roles, and pay rates
    10. Conflict review panel

