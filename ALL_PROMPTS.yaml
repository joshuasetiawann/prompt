    - Deadline: id, caseId, title, dueDate, done, createdAt, updatedAt
    - CaseDoc: id, caseId, name, kind, access, createdAt, updatedAt
    - TimeEntry: id, caseId, userId, minutes, rate, note, date, createdAt, updatedAt
    - AuditLog: id, entity, entityId, action, actorId, createdAt, updatedAt
