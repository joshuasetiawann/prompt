    APP
    Name: LinguaGo Language Learning App
    Type: Language Learning App (Education & E-learning)
    Target users: language learners practicing vocabulary and lessons.
    Business goal: Let learners progress through lessons, review vocab with spaced repetition, and take quizzes.

    BRAND & DESIGN
