  ready_to_use_prompt: |-
    You are a senior full-stack engineer who builds freight brokerage and load-matching products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

    STANDARD
    Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

    APP
    Name: LaneLink Freight Load Board & Brokerage Platform
    Type: Freight Load Board & Brokerage Platform (Freight Brokerage & Load Matching)
    Target users: freight brokers who post and match loads and carrier dispatchers who browse open lanes, book, and dispatch shipments.
    Business goal: Let shippers post freight loads, carriers browse and book open lanes, and brokers match, dispatch, and track shipments from booking through proof-of-delivery and settlement.

    BRAND & DESIGN
    Brand style: rugged, efficient, dependable. Colors: steel blue, safety orange, slate grey. A live load board of open lanes beside a shipment tracking map and a settlement panel. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

    TECH STACK
    - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
    - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
    - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
    - Zod and React Hook Form for both client-side and server-side validation
    - Vercel-ready and Docker-ready

    PAGES / SCREENS
    1. Home with featured lanes and brokerage stats
    2. Load board (open lanes with search, filter, and sort)
    3. Load detail with rate, stops, equipment, and booking
    4. Post a load (shipper and broker load entry)
    5. Carrier directory and onboarding (authority, insurance, equipment)
    6. Shipment dispatch and tracking board
    7. Proof-of-delivery and document upload (BOL and POD)
    8. Settlement and invoicing (carrier pay and shipper billing)
    9. Auth (sign in / register)
    10. Admin: users, carriers, and reports

    NAVIGATION
    - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

    USER ROLES
    - Broker — post loads, match carriers, dispatch, and settle
    - Carrier Dispatcher — browse open lanes, book loads, and update shipment status
    - Shipper — post freight, accept rates, and track shipments
    - Admin — manage users, carriers, and reports

    CORE FEATURES
    - Load board of open lanes filterable by origin, destination, equipment type, and date
    - Load posting with stops, weight, equipment, commodity, and target rate
    - Carrier onboarding capturing MC/DOT authority, insurance expiry, and equipment types
    - Load booking that locks a load to a single carrier and prevents double-booking
    - Rate negotiation with broker counteroffers and carrier acceptance
    - Dispatch and live status tracking through booked, at-pickup, in-transit, and delivered with check calls
    - Proof-of-delivery capture with BOL and POD document uploads
    - Settlement computing carrier pay, broker margin, and shipper invoice from the agreed rate
    - Carrier compliance checks blocking booking when authority or insurance is expired

    DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
    - User: id, email, passwordHash, name, role, companyName, createdAt, updatedAt
    - Carrier: id, userId, legalName, mcNumber, dotNumber, insuranceExpiry, equipmentTypes, status, createdAt, updatedAt
    - Load: id, shipperId, brokerId, origin, destination, pickupAt, deliverBy, equipmentType, weight, commodity, targetRate, status, createdAt, updatedAt
    - Booking: id, loadId, carrierId, agreedRate, status, dispatchedAt, createdAt, updatedAt
    - TrackingEvent: id, bookingId, status, location, note, occurredAt, createdAt, updatedAt
    - ShipmentDocument: id, bookingId, docType, fileUrl, uploadedById, createdAt, updatedAt
    - Settlement: id, bookingId, carrierPay, brokerMargin, shipperInvoice, status, paidAt, createdAt, updatedAt
    - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

    BACKEND / API LOGIC
    - Query the load board filtered by lane, equipment, date, and rate, hiding loads already booked
    - Book a load to a single carrier in a transaction and reject a double-booking on the same load
    - Verify carrier operating authority and insurance expiry before allowing a booking
    - Record rate counteroffers and finalize the agreed rate on carrier acceptance
    - Advance shipment status through booked, at-pickup, in-transit, and delivered with timestamped tracking events
    - Capture proof-of-delivery uploads and gate settlement on a delivered status with a POD on file
    - Compute settlement carrier pay, broker margin, and shipper invoice from the agreed rate
    - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

    ENVIRONMENT & MODES
    - Provide a complete .env.example documenting every variable.
    - Local mode runs fully on seed data with mock modes and no paid keys.
    - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
    - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

    SEED DATA
    - Seed realistic demo data: ~8 carriers with authority, insurance, and equipment, ~30 open and booked loads across varied lanes and equipment types, bookings with agreed rates, tracking events through delivery, uploaded BOL and POD documents, sample settlements, 1 admin, 2 brokers, 3 carrier dispatchers, and 2 shippers. Provide a seed script and list the demo login credentials in the README.

    UX REQUIREMENTS
    - Every data view has loading, empty, error, and success states.
    - All forms validate on client and server with inline messages and clear success/error feedback.
    - Realistic, human copywriting throughout — no dummy filler text.

    SECURITY
    - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

    TESTING
    - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

    DEPLOYMENT
    - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

    DELIVERABLES
    - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
    - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

    ACCEPTANCE CHECKLIST — the app must pass all of these
    - Installs and runs locally with the documented commands, on seed data, with no paid keys.
    - Builds successfully and migrates the database successfully.
    - Every page renders and is reachable from the navigation.
    - Forms validate on client and server; protected routes are protected; role permissions work.
    - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
    - Loading, empty, error, and success states are present; responsive layout works.
    - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
    - README setup steps and production deployment steps are complete.
