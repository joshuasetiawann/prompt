    Type: Photography Studio Booking & Proofing Portal (Booking & Client Proofing)
    Target users: clients booking sessions and reviewing proofs, and photographers managing sessions and galleries.
    Business goal: Let clients book sessions and select favorites from private galleries while photographers manage delivery.

    BRAND & DESIGN
    Brand style: artistic, minimal, premium. Colors: charcoal, warm cream, muted gold. Clean, modern, gallery-forward layout with elegant selection controls. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

    TECH STACK
    - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
    - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
    - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
    - Zod and React Hook Form for both client-side and server-side validation
    - Vercel-ready and Docker-ready

    PAGES / SCREENS
    1. Home and session booking
    2. Session packages and booking (date, type, deposit)
    3. Checkout (mock deposit)
    4. Client dashboard: sessions and galleries
    5. Proofing gallery (view, mark favorite, request)
    6. Download/delivery area
    7. Auth
    8. Photographer admin: sessions and galleries
    9. Admin: upload images and manage clients

    NAVIGATION
    - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

    USER ROLES
    - Client — book sessions and select proofs
    - Photographer/Admin — manage sessions, galleries, and delivery

    CORE FEATURES
    - Session packages with mock deposit booking
    - Private per-client proofing galleries (mock storage)
    - Favorite selection and selection limits per package
    - Final delivery/download area after approval
