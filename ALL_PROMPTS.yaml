    - Document: id, folderId, name, currentVersionId, ownerId, tags, createdAt, updatedAt
    - DocumentVersion: id, documentId, version, fileMeta, uploadedById, createdAt, updatedAt
    - Permission: id, resourceType, resourceId, userId, level, createdAt, updatedAt
    - AuditLog: id, resourceType, resourceId, action, actorId, createdAt, updatedAt
