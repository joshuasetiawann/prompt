  ready_to_use_prompt: |-
    You are a senior full-stack engineer who builds print-on-demand commerce products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

    STANDARD
    Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

    APP
    Name: InkRoute Print-on-Demand Merch Store Platform
    Type: Print-on-Demand Merch Store Platform (Custom Merchandise & Print-on-Demand)
    Target users: shoppers who design custom merch on a live mockup designer and a store owner managing the catalog while print partners fulfill and ship orders.
    Business goal: Let shoppers upload artwork and place it on blank products with a live mockup designer to buy custom merch, while the owner manages the catalog and paid orders auto-route to print partners for fulfillment and tracking.

    BRAND & DESIGN
    Brand style: creative, bold, maker-friendly. Colors: ink black, electric magenta, paper white. A live mockup designer canvas with a product picker rail and a real-time merch preview. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

    TECH STACK
    - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
    - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
    - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
    - Zod and React Hook Form for both client-side and server-side validation
    - Vercel-ready and Docker-ready

    PAGES / SCREENS
    1. Home with featured products and creator stores
    2. Product catalog with category and product-type filters
    3. Blank product detail with the live mockup designer (upload, place, preview)
    4. Cart
    5. Checkout with shipping address and mock payment
    6. Customer account: orders, saved designs, and fulfillment tracking
    7. Auth (sign in / register)
    8. Owner: blank product, design, and pricing management
    9. Print Partner: assigned orders and fulfillment queue
    10. Admin: orders, routing, and revenue reports

    NAVIGATION
    - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

    USER ROLES
    - Shopper — design custom products on live mockups and place orders
    - Store Owner — manage the blank catalog, designs, pricing, and orders
    - Print Partner — receive routed orders, update fulfillment, and ship
    - Admin — manage stores, print partners, and platform reports

    CORE FEATURES
    - Live mockup designer to upload artwork and place it on blank products with real-time preview
    - Blank product catalog with size/color variants and defined print areas
    - Saved custom designs reusable across products and orders
    - Cart and mock checkout that snapshots each item's artwork, placement, and variant
    - Automatic routing of paid order items to a matching print partner
    - Fulfillment status tracking from received to in-production to shipped with tracking numbers
    - Print partner queue with accept, in-production, and shipped status updates
    - Per-product base cost, print options, and creator markup pricing
    - Owner reports on sales, fulfillment time, and partner performance

    DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
    - User: id, email, passwordHash, name, role, createdAt, updatedAt
    - BlankProduct: id, name, productType, basePrice, variants, printAreas, status, createdAt, updatedAt
    - Design: id, ownerId, blankProductId, name, artworkUrl, placement, retailPrice, createdAt, updatedAt
    - Order: id, customerId, total, status, shippingAddress, createdAt, updatedAt
    - OrderItem: id, orderId, designId, variant, qty, lineTotal, printPartnerId, fulfillmentStatus, trackingNumber, createdAt, updatedAt
    - PrintPartner: id, name, capabilities, regions, status, createdAt, updatedAt
    - Payment: id, orderId, amount, status, method, createdAt, updatedAt
    - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

    BACKEND / API LOGIC
    - Render a live product mockup by compositing uploaded artwork onto a blank product's print areas
    - Validate uploaded artwork dimensions and resolution against each product's print area
    - Compute retail price from the blank base cost, print options, and the creator's markup
    - Create orders that snapshot each item's design, artwork, placement, and variant
    - Route each paid order item to a print partner that supports its product type and shipping region
    - Advance fulfillment status from received to in-production to shipped and attach tracking numbers
    - Aggregate sales, fulfillment time, and partner performance for owner reports
    - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

    ENVIRONMENT & MODES
    - Provide a complete .env.example documenting every variable.
    - Local mode runs fully on seed data with mock modes and no paid keys.
    - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
    - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

    SEED DATA
    - Seed realistic demo data: ~10 blank products across tees, hoodies, and mugs with size/color variants, 2 print partners, sample customer designs, paid orders in various fulfillment states, 1 admin, 1 store owner, and 3 customers. Provide a seed script and list the demo login credentials in the README.

    UX REQUIREMENTS
    - Every data view has loading, empty, error, and success states.
    - All forms validate on client and server with inline messages and clear success/error feedback.
    - Realistic, human copywriting throughout — no dummy filler text.

    SECURITY
    - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

    TESTING
    - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

    DEPLOYMENT
    - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

    DELIVERABLES
    - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
    - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

    ACCEPTANCE CHECKLIST — the app must pass all of these
    - Installs and runs locally with the documented commands, on seed data, with no paid keys.
    - Builds successfully and migrates the database successfully.
    - Every page renders and is reachable from the navigation.
    - Forms validate on client and server; protected routes are protected; role permissions work.
    - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
    - Loading, empty, error, and success states are present; responsive layout works.
    - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
    - README setup steps and production deployment steps are complete.
