  ready_to_use_prompt: |-
    You are a senior full-stack engineer who builds admissions intake and review systems for schools, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

    STANDARD
    Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

    APP
    Name: AdmitFlow School Admission Management System
    Type: School Admission Management System (Education Admissions)
    Target users: applicants and families applying and admissions staff reviewing and deciding.
    Business goal: Capture applications with documents, route them through review and interviews, and manage decisions.

    BRAND & DESIGN
    Brand style: academic, organized, welcoming. Colors: blue, gold accent, white. Clean, modern, application forms and a staff review pipeline. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

    TECH STACK
    - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
    - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
    - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
    - Zod and React Hook Form for both client-side and server-side validation
    - Vercel-ready and Docker-ready

    PAGES / SCREENS
    1. Home and program list
    2. Applicant: apply, my applications, status
    3. Application detail (documents, interview, status)
    4. Application fee (mock payment)
    5. Staff: applications pipeline and review
    6. Programs and intakes
    7. Interviews schedule
    8. Admin: users, audit log, reports

    NAVIGATION
    - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

    USER ROLES
    - Applicant — apply and track status
    - Reviewer/Staff — review applications and interview
    - Admin — manage programs, users, and decisions

    CORE FEATURES
    - Applications to programs with documents (mock storage)
    - Application fee via mock payment
    - Review pipeline: submitted, under review, interview, decision
    - Interview scheduling
    - Decision and enrollment offer
    - Role-scoped applicant access
    - Reports: funnel and yield

    DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
    - User: id, email, passwordHash, name, role, createdAt, updatedAt
    - Program: id, name, intakeTerm, createdAt, updatedAt
    - Application: id, programId, applicantId, status, createdAt, updatedAt
    - AppDoc: id, applicationId, name, status, createdAt, updatedAt
    - Interview: id, applicationId, scheduledFor, score, createdAt, updatedAt
    - Decision: id, applicationId, outcome, decidedAt, createdAt, updatedAt
    - Payment: id, applicationId, amount, status, createdAt, updatedAt
    - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

    BACKEND / API LOGIC
    - Application intake with documents and mock fee
    - Review pipeline transitions
    - Interview scheduling and scoring
    - Decision and enrollment offer
    - Funnel reporting and role-scoped access
    - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

    ENVIRONMENT & MODES
    - Provide a complete .env.example documenting every variable.
    - Local mode runs fully on seed data with mock modes and no paid keys.
    - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
    - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

    SEED DATA
    - Seed realistic demo data: ~5 programs, ~30 applications across stages, documents, interviews, decisions, 1 admin, 2 reviewers, 3 applicants. Provide a seed script and list the demo login credentials in the README.

