    BRAND & DESIGN
    Brand style: fresh, healthy, supportive. Colors: green, orange accent, white. Clean, modern, meal plan calendar and a daily nutrition tracker. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

