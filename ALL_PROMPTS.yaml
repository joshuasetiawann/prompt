    Business goal: Track stock in and out, manage suppliers and purchase orders, and flag low stock.

    BRAND & DESIGN
    Brand style: utilitarian, clear, operations-focused. Colors: amber, slate, white. Clean, modern, data-dense tables, quick filters, and clear stock indicators. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

