    - Supplier: id, name, contact, createdAt, updatedAt
    - PurchaseOrder: id, supplierId, status, createdAt, updatedAt
    - POItem: id, poId, productId, qty, received, createdAt, updatedAt
    - AuditLog: id, entity, entityId, action, userId, createdAt, updatedAt
