    APP
    Name: OpenGive Donation & Nonprofit Fundraising Platform
    Type: Donation & Nonprofit Fundraising Platform (Nonprofit & Fundraising)
    Target users: nonprofit admins running campaigns and donors giving one-off or recurring gifts.
    Business goal: Let organizations run campaigns with goals and let donors give (mock) and receive receipts.

    BRAND & DESIGN
    Brand style: warm, hopeful, trustworthy. Colors: emerald, warm gold, white. Clean, modern, campaign pages with progress bars and clear donate flow. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

