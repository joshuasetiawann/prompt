    - Availability: id, employeeId, dayOfWeek, startTime, endTime, isAvailable, createdAt, updatedAt
    - SwapRequest: id, shiftId, requesterId, targetEmployeeId, status, createdAt, updatedAt
    - TimeOffRequest: id, employeeId, startDate, endDate, reason, status, createdAt, updatedAt
    - CoverageRule: id, locationId, role, dayOfWeek, timeSlot, minStaff, createdAt, updatedAt
