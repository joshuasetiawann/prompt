  ready_to_use_prompt: |-
    You are a senior full-stack engineer who builds affordable housing and allocation products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

    STANDARD
    Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

    APP
    Name: HomeQueue Affordable Housing Waitlist & Application Portal
    Type: Affordable Housing Waitlist & Application Portal (Affordable Housing & Allocation)
    Target users: applicant households who apply for affordable units, upload income documents, and track their waitlist position and housing administrators and caseworkers who verify eligibility and match qualified households to available units.
    Business goal: Let applicant households apply for affordable housing, upload income and eligibility documents for staff verification, and run transparent lottery or priority waitlists that match qualified households to available units.

    BRAND & DESIGN
    Brand style: trustworthy, accessible, civic. Colors: navy blue, warm sand, white. A document-verification queue beside a waitlist ranking board and a unit-matching panel. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

    TECH STACK
    - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
    - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
    - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
    - Zod and React Hook Form for both client-side and server-side validation
    - Vercel-ready and Docker-ready

    PAGES / SCREENS
    1. Program and unit availability home
    2. Application wizard (household, income, unit preferences)
    3. Document upload and verification status
    4. Applicant portal: waitlist position and offers
    5. Caseworker: application review and document verification queue
    6. Waitlist and lottery management board
    7. Unit inventory and household matching
    8. Offer management and response tracking
    9. Auth (sign in / register)
    10. Admin: programs, eligibility rules, and reports

    NAVIGATION
    - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

    USER ROLES
    - Applicant — apply, upload documents, track waitlist position, and respond to unit offers
    - Caseworker — review applications, verify income and eligibility documents, and manage offers
    - Program Administrator — configure programs, eligibility rules, and run lotteries or priority waitlists
    - Admin — manage users, properties, and reports

    CORE FEATURES
    - Multi-step affordable housing application capturing household composition, income sources, and unit-size preferences
    - Secure document upload for income proof, IDs, and eligibility verification with reviewer annotations
    - Income and eligibility verification against program area median income (AMI) limits by household size
    - Priority waitlist with configurable preference points (veteran, disability, local residency) and ranking
    - Transparent lottery draw with a seeded, auditable random ordering for over-subscribed programs
    - Unit inventory with bedroom count, rent, and AMI tier, plus matching of qualified households to vacant units
    - Unit offer workflow with response deadlines, acceptance, decline, and automatic next-in-line escalation
    - Applicant self-service portal showing waitlist position, verification status, and active offers
    - Audit trail and reporting on applications, verifications, lotteries, and placements

    DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
    - User: id, email, passwordHash, name, role, phone, createdAt, updatedAt
    - HousingProgram: id, name, description, amiLimitPercent, preferenceRules, allocationMethod, status, createdAt, updatedAt
    - Application: id, programId, applicantId, householdSize, annualIncome, preferencePoints, status, submittedAt, createdAt, updatedAt
    - Document: id, applicationId, type, fileUrl, verificationStatus, reviewedById, reviewedAt, notes, createdAt, updatedAt
    - WaitlistEntry: id, applicationId, programId, rank, lotteryNumber, status, createdAt, updatedAt
    - Unit: id, programId, unitNumber, bedrooms, monthlyRent, amiTier, status, createdAt, updatedAt
    - Offer: id, waitlistEntryId, unitId, status, respondByDate, respondedAt, createdAt, updatedAt
    - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

    BACKEND / API LOGIC
    - Validate household income and size against program AMI limits to determine eligibility
    - Review uploaded documents and transition applications through submitted, under-review, verified, and rejected states
    - Compute preference points from program rules and rank priority-waitlist entries
    - Run a seeded, auditable lottery draw to assign lottery numbers and order over-subscribed programs
    - Match the highest-ranked eligible household to a vacant unit by bedroom size and AMI tier
    - Manage unit offers with response deadlines and auto-escalate to the next-in-line household on decline or timeout
    - Record an audit trail of verifications, lottery draws, offers, and placements for reporting
    - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

    ENVIRONMENT & MODES
    - Provide a complete .env.example documenting every variable.
    - Local mode runs fully on seed data with mock modes and no paid keys.
    - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

    SEED DATA
    - Seed realistic demo data: 2 housing programs (one lottery, one priority waitlist) with AMI limits and preference rules, ~25 applicant households with income and uploaded documents at varied verification states, ranked waitlist entries, ~12 units across bedroom sizes, sample offers in accepted/declined/pending states, 1 admin, 2 caseworkers, and 8 applicants. Provide a seed script and list the demo login credentials in the README.

    UX REQUIREMENTS
    - Every data view has loading, empty, error, and success states.
    - All forms validate on client and server with inline messages and clear success/error feedback.
    - Realistic, human copywriting throughout — no dummy filler text.

    SECURITY
    - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

    TESTING
    - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

    DEPLOYMENT
    - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

    DELIVERABLES
    - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
    - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

    ACCEPTANCE CHECKLIST — the app must pass all of these
    - Installs and runs locally with the documented commands, on seed data, with no paid keys.
    - Builds successfully and migrates the database successfully.
    - Every page renders and is reachable from the navigation.
    - Forms validate on client and server; protected routes are protected; role permissions work.
    - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
    - Loading, empty, error, and success states are present; responsive layout works.
    - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
    - README setup steps and production deployment steps are complete.
