    - Shift swap marketplace with manager approval and reassignment
    - Time-off requests with approval and automatic schedule blocking
    - Real-time labor-cost projection from shift hours and pay rates
    - Conflict flagging for double-bookings, overtime, and availability violations
    - Publish-and-notify workflow that locks and announces the rota
    - Reports on hours, labor cost, and coverage gaps by location

