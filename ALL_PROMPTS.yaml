    APP
    Name: AttriBoard Marketing Attribution & Campaign ROI Dashboard
    Type: Marketing Attribution & Campaign ROI Dashboard (Marketing Attribution & ROI)
    Target users: marketing analysts and performance marketers who track cross-channel ROI and an agency account manager who schedules client reports.
