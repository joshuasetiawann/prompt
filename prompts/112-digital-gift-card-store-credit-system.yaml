backend_logic:
- Issue a gift card with a unique secure code and schedule its delivery email
- Send (log) the gift card delivery email at the scheduled time to the recipient
- Look up a card or credit balance by code and return its transaction history
- Apply partial redemption at checkout, draw from gift card then store credit, and recompute the order total
- Carry the remaining balance forward and record a credit transaction for each spend
- Issue, void, reactivate, and adjust store credit and gift card balances with ledger entries
- Aggregate outstanding stored-value liability and redemption activity for reports
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Customer — buy, send, and redeem gift cards and store credit
- Recipient — claim a gift card and check its balance
- Shop Admin — issue, void, and manage gift cards and store credit
env_payments: true
env_ai: false
seed_data: '- Seed realistic demo data: ~6 gift card designs, ~15 issued gift cards across active, partially redeemed, and depleted states, several store-credit balances, sample orders with partial redemptions, 1 admin, and 3 customers. Provide a seed script and list the demo login credentials in the README.'
security_requirements:
- No hardcoded secrets — all secrets via environment variables
- Server-side validation on every mutation
- Role-based access control where roles exist
- Protected routes for all private pages
- Safe file-upload handling where uploads exist
- Rate-limiting guidance for public endpoints
- Audit logs for sensitive actions where relevant
