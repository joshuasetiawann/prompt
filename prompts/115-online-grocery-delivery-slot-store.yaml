backend_logic:
- Compute the cart estimated total combining unit-priced and weight-priced items
- Reserve a delivery/pickup slot at checkout enforcing per-slot capacity inside a transaction
- Pre-authorize a mock payment for the estimated total to allow for weight adjustments
- 'Run the picker workflow: record picked quantities, captured weights, and out-of-stock items'
- Propose substitutions and route them to the shopper for approval or rejection
- Reconcile the final total from picked weights and approved substitutions, then capture the final charge
- 'Aggregate fulfillment metrics: slot utilization, pick accuracy, and substitution rate'
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Shopper — browse groceries, book a slot, set substitution preferences, and order
- Picker — pick baskets, weigh items, and propose substitutions
- Dispatcher — manage slots, assign pickers, and track fulfillment
- Admin — manage the catalog, pricing, and reports
