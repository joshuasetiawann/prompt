ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds procurement and purchasing products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: ProcureFlow Procurement & Purchase Order Management System
  Type: Procurement & Purchase Order Management System (Procurement & Purchasing)
  Target users: procurement managers who raise and approve purchase orders and finance teams that match invoices to deliveries before payment.
  Business goal: Let staff raise purchase requisitions, route them for budget approval, convert approved requests into purchase orders, and reconcile deliveries and invoices through three-way matching.

  BRAND & DESIGN
  Brand style: structured, trustworthy, efficient. Colors: navy, teal, light grey. A requisition-to-PO pipeline board with an approval timeline and a three-way match comparison panel. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Dashboard with pending approvals, open purchase orders, and match exceptions
  2. Requisition list with status filters
  3. New/edit requisition with line items, cost center, and budget code
  4. Approval queue with budget context and decision actions
  5. Purchase order list and PO detail
  6. Goods receipt entry against PO lines
  7. Invoice entry and three-way match review
  8. Vendor directory and catalog management
  9. Auth (sign in / register)
  10. Admin: budgets, approval rules, and spend reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Requester — raise purchase requisitions and track their approval
  - Approver — review requisitions against budget and approve or reject
  - Procurement Manager — convert approved requisitions into purchase orders and manage vendors
  - Accounts Payable — record deliveries, match invoices, and release payment

  CORE FEATURES
  - Purchase requisitions with multiple line items, cost centers, and budget codes
  - Multi-step approval routing based on amount thresholds and department
  - Budget checking that warns or blocks requisitions exceeding remaining budget
  - One-click conversion of approved requisitions into purchase orders to vendors
  - Goods receipt recording against PO lines with partial-delivery support
  - Three-way matching of purchase order, receipt, and invoice within tolerance rules
  - Exception flagging for quantity or price mismatches that block payment
  - Vendor directory with item catalogs and agreed pricing
  - Budget and spend reports by cost center, vendor, and period

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, department, createdAt, updatedAt
  - Vendor: id, name, contactEmail, phone, address, paymentTerms, status, createdAt, updatedAt
  - Budget: id, costCenter, fiscalPeriod, allocatedAmount, committedAmount, spentAmount, createdAt, updatedAt
  - Requisition: id, requesterId, budgetId, status, justification, lineItems, totalAmount, approvals, createdAt, updatedAt
  - PurchaseOrder: id, requisitionId, vendorId, poNumber, status, lineItems, totalAmount, expectedDate, createdAt, updatedAt
  - GoodsReceipt: id, purchaseOrderId, receivedById, receivedLines, receivedDate, status, createdAt, updatedAt
  - Invoice: id, purchaseOrderId, vendorId, invoiceNumber, lineItems, invoiceTotal, matchStatus, paymentStatus, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Route a submitted requisition through approval steps determined by amount thresholds and department rules
  - Check requisition line totals against the cost center's remaining budget and warn or block when exceeded
  - Convert an approved requisition into a purchase order, generate a unique PO number, and commit the amount against the budget
  - Record goods receipts against PO lines and support partial and over-delivery handling
  - Run three-way matching of PO, receipt, and invoice quantities and prices within configured tolerances
  - Flag and hold invoices with quantity or price mismatches and release matched invoices for payment
  - Aggregate committed and actual spend by cost center, vendor, and period for reporting
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 8 vendors, ~6 cost-center budgets, ~20 requisitions across draft, pending-approval, approved, and rejected states, purchase orders with goods receipts and invoices in matched and exception states, 1 admin, 2 approvers, 1 AP clerk, and 3 requesters. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
