backend_logic:
- Route a submitted requisition through approval steps determined by amount thresholds and department rules
- Check requisition line totals against the cost center's remaining budget and warn or block when exceeded
- Convert an approved requisition into a purchase order, generate a unique PO number, and commit the amount against the budget
- Record goods receipts against PO lines and support partial and over-delivery handling
- Run three-way matching of PO, receipt, and invoice quantities and prices within configured tolerances
- Flag and hold invoices with quantity or price mismatches and release matched invoices for payment
- Aggregate committed and actual spend by cost center, vendor, and period for reporting
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Requester — raise purchase requisitions and track their approval
- Approver — review requisitions against budget and approve or reject
- Procurement Manager — convert approved requisitions into purchase orders and manage vendors
- Accounts Payable — record deliveries, match invoices, and release payment
