ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds generative-image and creative-studio products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: Aperture AI Image Generation & Brand Asset Studio
  Type: AI Image Generation & Brand Asset Studio (Generative Image & Creative Studio)
  Target users: creators who generate and iterate on images from prompts and brand reviewers who route assets through an approve-or-reject workflow.
  Business goal: Let teams generate and iterate on images from prompts, organize outputs into projects and brand collections, manage a shared prompt library, and route assets through a review-and-approve workflow with credit tracking.

  BRAND & DESIGN
  Brand style: creative, vibrant, refined. Colors: charcoal, gradient violet, canvas white. A generation studio with a prompt composer, a results grid of variations, and a brand-collection board with approval badges. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Generation studio with prompt composer, settings, and a variations grid
  2. Projects list and project detail with organized outputs
  3. Brand collections board with approval status
  4. Asset detail with versions, prompt used, and review history
  5. Shared prompt library with reusable, categorized prompts
  6. Review queue for submitted assets (approve / request changes)
  7. Credit usage and history
  8. Auth (sign in / register)
  9. Admin: projects, collections, prompt library, and credit allocation
  10. Settings: brand guidelines and model preferences

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Creator — generate and iterate on images and submit them for review
  - Brand Reviewer — review submitted assets and approve or request changes
  - Studio Admin — manage projects, brand collections, the prompt library, and credits

  CORE FEATURES
  - Prompt-based image generation producing multiple variations per request
  - Iteration on an existing image with prompt tweaks tracked as versions
  - Projects and brand collections to organize generated assets
  - Shared prompt library with reusable, categorized, tagged prompts
  - Review-and-approve workflow routing assets to a reviewer with approve or request-changes
  - Per-project credit tracking that decrements on each generation and blocks at zero
  - Asset versioning that records the prompt and settings used for each generation
  - Download and export of approved brand-collection assets
  - Generation history and status with a processing queue

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - Project: id, name, ownerId, description, creditBalance, createdAt, updatedAt
  - Collection: id, projectId, name, brandGuidelines, createdAt, updatedAt
  - Generation: id, projectId, creatorId, prompt, settings, status, creditsUsed, createdAt, updatedAt
  - Asset: id, generationId, collectionId, imageUrl, version, parentAssetId, reviewStatus, createdAt, updatedAt
  - PromptTemplate: id, ownerId, title, body, category, tags, createdAt, updatedAt
  - Review: id, assetId, reviewerId, decision, comment, decidedAt, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Generate multiple image variations from a prompt and settings via the AI provider with a processing queue
  - Create a new linked asset version when iterating on an existing image with a tweaked prompt
  - Decrement project credits on each generation and block generation when the balance is exhausted
  - Organize assets into projects and brand collections
  - Route submitted assets to a reviewer and record approve or request-changes decisions with comments
  - Manage a shared prompt library of reusable, categorized, tagged prompts
  - Export approved brand-collection assets for download
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - AI: implement a deterministic, offline mock AI provider behind one interface; switch to a real model (OpenAI/Anthropic) via an env var, defaulting to mock so it runs with no keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: ~3 projects with brand collections, sample generations with image variations and versions, a shared prompt library, assets in pending, approved, and changes-requested states, per-project credit balances with usage history, 1 admin, 2 creators, and 1 reviewer. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
