backend_logic:
- Generate multiple image variations from a prompt and settings via the AI provider with a processing queue
- Create a new linked asset version when iterating on an existing image with a tweaked prompt
- Decrement project credits on each generation and block generation when the balance is exhausted
- Organize assets into projects and brand collections
- Route submitted assets to a reviewer and record approve or request-changes decisions with comments
- Manage a shared prompt library of reusable, categorized, tagged prompts
- Export approved brand-collection assets for download
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
