backend_logic:
- Ingest and normalize campaign spend and conversion data across channels via import
- Reconstruct multi-touch conversion paths from the touchpoints of each conversion
- Apply first-touch, last-touch, linear, and time-decay attribution models to allocate conversion revenue across touchpoints
- Compute ROAS, CPA, and conversion rate by channel and campaign for the selected model
- Track budget vs actual spend with pacing and overspend detection
- Aggregate funnel-stage performance across campaigns
- Generate and deliver scheduled reports on a configured cadence
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Admin — manage workspaces, channels, budgets, and users
- Marketing Analyst — configure attribution models and analyze cross-channel ROI
- Account Manager — track campaign performance and schedule client reports
env_payments: false
env_ai: false
