ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds marketing-attribution and ROI-analytics products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: AttriBoard Marketing Attribution & Campaign ROI Dashboard
  Type: Marketing Attribution & Campaign ROI Dashboard (Marketing Attribution & ROI)
  Target users: marketing analysts and performance marketers who track cross-channel ROI and an agency account manager who schedules client reports.
  Business goal: Let marketing teams consolidate cross-channel spend and conversion data, apply attribution models to allocate revenue, and report ROAS, CPA, and funnel performance with budget tracking and scheduled reports.

  BRAND & DESIGN
  Brand style: analytical, vibrant, marketing-savvy. Colors: indigo, coral, off-white. A channel ROI overview with an attribution-model comparison and a conversion-path explorer. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. ROI overview dashboard with spend, revenue, ROAS, and CPA by channel
  2. Channels & campaigns list with spend and conversion data
  3. Campaign detail with funnel and touchpoint breakdown
  4. Attribution model comparison (first-touch, last-touch, linear, time-decay)
  5. Conversion path / touchpoint explorer
  6. Budget vs actual tracking by channel and campaign
  7. Data imports / channel connections for spend and conversions
  8. Scheduled reports manager
  9. Auth (sign in / register)
  10. Admin: users, channels, and workspace settings

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Admin — manage workspaces, channels, budgets, and users
  - Marketing Analyst — configure attribution models and analyze cross-channel ROI
  - Account Manager — track campaign performance and schedule client reports

  CORE FEATURES
  - Cross-channel consolidation of campaign spend and conversion data via import
  - Multiple attribution models (first-touch, last-touch, linear, time-decay) applied to conversion paths
  - Revenue allocation across touchpoints per the selected attribution model
  - ROAS, CPA, and conversion-rate metrics by channel and campaign
  - Funnel performance reporting across stages
  - Budget-vs-actual tracking with pacing and overspend flags
  - Side-by-side attribution model comparison
  - Scheduled report generation and delivery via email/export
  - Multi-touch conversion path explorer

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - Channel: id, name, type, costModel, status, createdAt, updatedAt
  - Campaign: id, channelId, name, budget, startDate, endDate, status, createdAt, updatedAt
  - SpendRecord: id, campaignId, date, amount, impressions, clicks, createdAt, updatedAt
  - Conversion: id, campaignId, value, convertedAt, customerRef, createdAt, updatedAt
  - Touchpoint: id, conversionId, campaignId, channelId, position, occurredAt, createdAt, updatedAt
  - ScheduledReport: id, name, ownerId, scope, attributionModel, cadence, lastRunAt, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Ingest and normalize campaign spend and conversion data across channels via import
  - Reconstruct multi-touch conversion paths from the touchpoints of each conversion
  - Apply first-touch, last-touch, linear, and time-decay attribution models to allocate conversion revenue across touchpoints
  - Compute ROAS, CPA, and conversion rate by channel and campaign for the selected model
  - Track budget vs actual spend with pacing and overspend detection
  - Aggregate funnel-stage performance across campaigns
  - Generate and deliver scheduled reports on a configured cadence
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: ~5 channels, ~15 campaigns with daily spend records, conversions with multi-touch paths, channel and campaign budgets, a couple of scheduled reports, 1 admin, 1 analyst, and 1 account manager. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
