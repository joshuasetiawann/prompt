backend_logic:
- Match instructor weekly availability against vehicle availability to compute bookable lesson slots
- Book lessons with conflict detection across instructor, vehicle, and learner calendars and vehicle maintenance blocks
- Deduct a lesson from the learner's active package on booking and restore it on eligible cancellation
- Track logged hours and update the per-learner skill checklist after each completed lesson
- Record mock package purchases and payments and maintain package balances and top-ups
- Manage theory-test bookings and record pass/fail results against each learner
- Enforce cancellation and reschedule notice windows and update slot availability accordingly
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- School Owner — manage instructors, vehicles, packages, payments, and reports
- Instructor — set availability, run lessons, and update skill checklists
- Learner Driver — book lessons, track hours and skills, and pay for packages
