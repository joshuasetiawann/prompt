ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds operations software for vocational and driving education, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: GearUp Driving School Management System
  Type: Driving School Management System (Vocational & Driving Education)
  Target users: driving school owners and instructors who schedule lessons against vehicles and availability and learner drivers who book slots and track progress toward their license.
  Business goal: Let driving schools schedule practical lessons against instructor availability and a shared vehicle fleet, track each learner's skill checklist and required hours, and manage theory-test bookings, packages, and payments.

  BRAND & DESIGN
  Brand style: practical, reassuring, road-ready. Colors: signal yellow, charcoal, white. A weekly scheduling board with instructor and vehicle lanes, a learner progress checklist, and a lesson booking drawer. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Dashboard with today's lessons, fleet status, and learner progress overview
  2. Scheduling board with instructor and vehicle lanes and bookable slots
  3. Lesson booking flow (pick instructor, vehicle, slot, lesson type)
  4. Learner profile (skill checklist, hours logged, package balance)
  5. Instructor availability manager
  6. Vehicle fleet management (maintenance, availability, assignments)
  7. Packages and payments (lesson bundles, mock checkout, balances)
  8. Theory-test booking management
  9. Auth (sign in / register)
  10. Admin: users, pricing, and reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - School Owner — manage instructors, vehicles, packages, payments, and reports
  - Instructor — set availability, run lessons, and update skill checklists
  - Learner Driver — book lessons, track hours and skills, and pay for packages

  CORE FEATURES
  - Scheduling board matching instructor availability against a shared vehicle fleet to prevent double-booking
  - Lesson booking with conflict detection across instructor, vehicle, and learner calendars
  - Per-learner skill checklist and required-hours tracking toward license readiness
  - Lesson packages and bundles with balance deduction per booked lesson
  - Mock package checkout and payment recording with balance top-ups
  - Vehicle fleet management with maintenance blocks that remove cars from availability
  - Theory-test booking and pass/fail result recording per learner
  - Instructor availability windows with recurring weekly patterns
  - Cancellation and rescheduling rules with notice windows

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - Instructor: id, userId, licenseNumber, transmissionTypes, availabilityJson, createdAt, updatedAt
  - Vehicle: id, registration, model, transmission, status, createdAt, updatedAt
  - Learner: id, userId, licenseStage, requiredHours, hoursLogged, theoryTestDate, theoryTestStatus, createdAt, updatedAt
  - Lesson: id, learnerId, instructorId, vehicleId, lessonType, startsAt, endsAt, status, notes, createdAt, updatedAt
  - SkillCheck: id, learnerId, lessonId, skillName, rating, createdAt, updatedAt
  - Package: id, learnerId, name, totalLessons, usedLessons, amountPaid, paymentStatus, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Match instructor weekly availability against vehicle availability to compute bookable lesson slots
  - Book lessons with conflict detection across instructor, vehicle, and learner calendars and vehicle maintenance blocks
  - Deduct a lesson from the learner's active package on booking and restore it on eligible cancellation
  - Track logged hours and update the per-learner skill checklist after each completed lesson
  - Record mock package purchases and payments and maintain package balances and top-ups
  - Manage theory-test bookings and record pass/fail results against each learner
  - Enforce cancellation and reschedule notice windows and update slot availability accordingly
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 1 driving school with 3 instructors and a 4-vehicle fleet, ~6 learners at different license stages with skill checklists and package balances, ~40 lessons across booked, completed, and cancelled states, theory-test bookings, and demo logins for 1 owner, 3 instructors, and 6 learners. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
