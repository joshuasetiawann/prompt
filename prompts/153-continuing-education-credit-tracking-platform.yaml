backend_logic:
- Compute renewal-cycle progress by summing approved credit hours per requirement category against required hours
- Accept self-logged credits with certificate uploads and route them to the verifier audit queue
- Let providers issue verifiable course credits that post directly to attendees' ledgers
- Process verifier decisions (approve, reject, request changes) and update cycle progress and the audit trail
- Resolve profession- and jurisdiction-specific requirement rules and deadlines for each license
- Aggregate team and cohort compliance and flag professionals at risk of missing deadlines
- Generate per-professional, per-cycle compliance reports and send mock deadline and shortfall reminders
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Licensed Professional — log credits, upload certificates, and track renewal progress
- Course Provider — publish accredited courses and issue verifiable completion credits
- Verifier / Board Admin — audit submissions and approve or reject credits
- CE Coordinator — monitor team compliance across renewal cycles
