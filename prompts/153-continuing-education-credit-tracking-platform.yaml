ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds compliance-driven professional continuing-education products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: CredTrack Continuing Education Credit Tracking Platform
  Type: Continuing Education Credit Tracking Platform (Professional Continuing Education)
  Target users: licensed professionals and coordinators who log CEU/CPD credits toward renewal cycles and course providers and verifiers who issue accredited credits and audit submissions.
  Business goal: Let licensed professionals log CEU/CPD credits and upload completion certificates while progress bars track renewal-cycle requirements, providers issue accredited course credits, and verifiers audit submissions.

  BRAND & DESIGN
  Brand style: credible, compliant, reassuring. Colors: navy, teal, light grey. A renewal-cycle dashboard with category progress rings, a credit ledger, and a certificate upload panel. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Dashboard with renewal-cycle progress, credits needed by category, and deadlines
  2. Credit ledger (logged credits with status and evidence)
  3. Log credit / upload certificate flow
  4. Accredited course catalog
  5. Provider portal (publish courses, issue credits)
  6. Verifier audit queue (review evidence, approve/reject)
  7. Renewal cycle and requirements (categories, required hours, deadlines)
  8. Team compliance overview for coordinators
  9. Auth (sign in / register)
  10. Admin: accreditations, professions, and requirement rules

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Licensed Professional — log credits, upload certificates, and track renewal progress
  - Course Provider — publish accredited courses and issue verifiable completion credits
  - Verifier / Board Admin — audit submissions and approve or reject credits
  - CE Coordinator — monitor team compliance across renewal cycles

  CORE FEATURES
  - Credit logging against requirement categories with certificate and evidence upload
  - Renewal-cycle progress bars showing earned vs required hours per category
  - Accredited course catalog with provider-issued, verifiable completion credits
  - Verifier audit queue to review evidence and approve, reject, or request changes
  - Provider portal to publish courses and issue credits to attendee accounts
  - Profession- and jurisdiction-specific requirement rules and renewal deadlines
  - Team and cohort compliance dashboard for coordinators with at-risk flags
  - Exportable, audit-trailed compliance report per professional per cycle
  - Deadline and shortfall reminders (mock email log)

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - License: id, userId, profession, jurisdiction, licenseNumber, renewalDate, createdAt, updatedAt
  - RenewalCycle: id, licenseId, startDate, endDate, requiredHours, status, createdAt, updatedAt
  - RequirementCategory: id, profession, jurisdiction, name, requiredHours, createdAt, updatedAt
  - Course: id, providerId, title, accreditationNumber, creditHours, categoryId, createdAt, updatedAt
  - CreditEntry: id, userId, cycleId, courseId, categoryId, hours, completionDate, certificateUrl, status, verifierId, createdAt, updatedAt
  - AuditLog: id, creditEntryId, verifierId, action, note, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Compute renewal-cycle progress by summing approved credit hours per requirement category against required hours
  - Accept self-logged credits with certificate uploads and route them to the verifier audit queue
  - Let providers issue verifiable course credits that post directly to attendees' ledgers
  - Process verifier decisions (approve, reject, request changes) and update cycle progress and the audit trail
  - Resolve profession- and jurisdiction-specific requirement rules and deadlines for each license
  - Aggregate team and cohort compliance and flag professionals at risk of missing deadlines
  - Generate per-professional, per-cycle compliance reports and send mock deadline and shortfall reminders
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 3 professions with jurisdiction-specific requirement categories, ~5 licensed professionals on active renewal cycles, ~40 credit entries across pending, approved, and rejected states with certificate uploads, 2 course providers with accredited courses and issued credits, a verifier audit queue, and demo logins for 1 board admin, 1 coordinator, and 5 professionals. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
