required_features:
- Weekly scheduling board assigning caregivers to client visits without double-booking
- Geolocated electronic visit verification capturing check-in/out time and GPS coordinates
- EVV exception flagging when check-in is outside the client's location radius or a visit is missed
- Per-client care plan with tasks the caregiver completes during each visit
- Visit notes and task completion recorded from the caregiver mobile view
- Authorized-hours tracking comparing scheduled and verified hours against authorization
- Family portal showing the care plan, upcoming visits, and completed visit notes
- Caregiver availability and qualification matching for assignments
- Compliance and hours reporting per client, caregiver, and payer
