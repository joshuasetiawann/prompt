backend_logic:
- Assign caregivers to visits with conflict detection across caregiver schedules and availability
- Record geolocated check-in/out and stamp verified visit times from the captured coordinates
- Flag EVV exceptions when check-in is outside the client's location radius or a visit is missed
- Compute verified visit hours and compare scheduled and verified hours against client authorization
- Track care-plan task completion per visit from the caregiver mobile view
- Expose the care plan, upcoming visits, and visit notes to the linked family member
- Aggregate EVV compliance and hours-used reports per client, caregiver, and payer
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Agency Coordinator — schedule visits, assign caregivers, monitor EVV compliance, and manage care plans
- Home Caregiver — view assigned visits, check in and out with geolocation, and complete visit notes and tasks
- Family Member — follow the client's care plan, upcoming visits, and caregiver notes
