required_pages:
- Coordinator dashboard with today's visits, missed check-ins, and EVV exceptions
- Scheduling board with caregiver lanes and assignable visit slots
- Visit assignment flow (pick client, caregiver, time, and tasks)
- Caregiver mobile visit view (check-in/out, care-plan tasks, notes)
