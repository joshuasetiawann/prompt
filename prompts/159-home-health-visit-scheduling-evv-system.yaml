ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds home health and caregiving operations products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: CareRoute Home Health Visit Scheduling & EVV System
  Type: Home Health Visit Scheduling & EVV System (Home Health & Caregiving)
  Target users: agency coordinators who schedule caregiver visits and home caregivers who check in and out with geolocated electronic visit verification.
  Business goal: Let coordinators schedule caregiver visits, let caregivers check in and out with geolocated electronic visit verification, and let families follow care plans and visit notes.

  BRAND & DESIGN
  Brand style: dependable, warm, mobile-first. Colors: caregiver teal, soft amber, warm white. A weekly visit schedule with caregiver lanes beside a mobile check-in screen showing geolocation status and care-plan tasks. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Coordinator dashboard with today's visits, missed check-ins, and EVV exceptions
  2. Scheduling board with caregiver lanes and assignable visit slots
  3. Visit assignment flow (pick client, caregiver, time, and tasks)
  4. Caregiver mobile visit view (check-in/out, care-plan tasks, notes)
  5. Client profile and care plan (tasks, goals, authorized hours)
  6. EVV compliance log (check-in geolocation and exceptions)
  7. Family portal (care plan, visit history, and notes)
  8. Auth (sign in / register)
  9. Admin: users, clients, authorizations, and reports
  10. Reports (visit completion, EVV compliance, and hours used)

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Agency Coordinator — schedule visits, assign caregivers, monitor EVV compliance, and manage care plans
  - Home Caregiver — view assigned visits, check in and out with geolocation, and complete visit notes and tasks
  - Family Member — follow the client's care plan, upcoming visits, and caregiver notes

  CORE FEATURES
  - Weekly scheduling board assigning caregivers to client visits without double-booking
  - Geolocated electronic visit verification capturing check-in/out time and GPS coordinates
  - EVV exception flagging when check-in is outside the client's location radius or a visit is missed
  - Per-client care plan with tasks the caregiver completes during each visit
  - Visit notes and task completion recorded from the caregiver mobile view
  - Authorized-hours tracking comparing scheduled and verified hours against authorization
  - Family portal showing the care plan, upcoming visits, and completed visit notes
  - Caregiver availability and qualification matching for assignments
  - Compliance and hours reporting per client, caregiver, and payer

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - Client: id, coordinatorId, fullName, address, latitude, longitude, authorizedHours, createdAt, updatedAt
  - Caregiver: id, userId, qualifications, availabilityJson, status, createdAt, updatedAt
  - Visit: id, clientId, caregiverId, scheduledStart, scheduledEnd, status, createdAt, updatedAt
  - VisitVerification: id, visitId, checkInAt, checkInLat, checkInLng, checkOutAt, checkOutLat, checkOutLng, exceptionFlag, createdAt, updatedAt
  - CarePlanTask: id, clientId, visitId, description, completed, completedAt, createdAt, updatedAt
  - VisitNote: id, visitId, caregiverId, content, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Assign caregivers to visits with conflict detection across caregiver schedules and availability
  - Record geolocated check-in/out and stamp verified visit times from the captured coordinates
  - Flag EVV exceptions when check-in is outside the client's location radius or a visit is missed
  - Compute verified visit hours and compare scheduled and verified hours against client authorization
  - Track care-plan task completion per visit from the caregiver mobile view
  - Expose the care plan, upcoming visits, and visit notes to the linked family member
  - Aggregate EVV compliance and hours-used reports per client, caregiver, and payer
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 1 home-care agency with 1 coordinator and 4 caregivers, ~10 clients with addresses, care plans, and authorized hours, ~50 visits across scheduled, completed, and missed states, geolocated check-in/out verifications with some EVV exceptions, visit notes and completed tasks, and demo logins for 1 admin, 1 coordinator, 2 caregivers, and 2 family members. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
