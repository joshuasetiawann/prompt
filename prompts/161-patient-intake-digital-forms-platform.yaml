ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds patient intake and digital forms products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: IntakeFlow Patient Intake & Digital Forms Platform
  Type: Patient Intake & Digital Forms Platform (Patient Intake & Forms)
  Target users: patients completing pre-visit medical-history forms and e-signed consents from home and front-desk staff reviewing and approving the finished intake packets.
  Business goal: Let clinics build conditional intake forms, collect e-signed consents and insurance details from patients before the visit, and route completed packets to front-desk staff for review.

  BRAND & DESIGN
  Brand style: calm, clinical, reassuring. Colors: soft teal, white, slate. A step-by-step form wizard with a progress bar and a clean front-desk review queue. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Clinic landing page with intake overview
  2. Patient: my forms dashboard with assigned packets and status
  3. Patient: conditional multi-step intake form wizard
  4. Patient: consent e-signature page
  5. Patient: insurance and photo ID upload
  6. Auth (sign in / register / secure access link)
  7. Front-desk: intake review queue
  8. Front-desk: packet detail with approve, reject, and request-correction actions
  9. Admin: drag-and-drop form template builder
  10. Admin: clinic settings and intake reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Patient — complete assigned intake forms, e-sign consents, and submit insurance details
  - Front-Desk Staff — send packets, review submissions, and approve or request corrections
  - Clinic Admin — build conditional form templates, manage consent documents, and configure clinic settings

  CORE FEATURES
  - Drag-and-drop conditional form builder with show/hide logic driven by answers
  - Multi-step patient intake wizard with save-and-resume
  - E-signature capture for consent documents with timestamp and audit trail
  - Insurance card and photo ID secure upload with manual field entry
  - Pre-visit packet assignment via secure access link or email
  - Front-desk review queue with approve, reject, and request-correction actions
  - Completeness checks that flag missing required fields and unsigned consents
  - Packet status tracking across sent, in progress, submitted, reviewed, and approved
  - Reusable consent and form template library

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, phone, createdAt, updatedAt
  - FormTemplate: id, createdById, name, description, schema, version, status, createdAt, updatedAt
  - IntakePacket: id, patientId, assignedById, templateId, status, accessToken, dueDate, submittedAt, createdAt, updatedAt
  - FormResponse: id, packetId, templateId, answers, completedAt, createdAt, updatedAt
  - Consent: id, packetId, title, documentText, signatureData, signedByName, signedAt, ipAddress, createdAt, updatedAt
  - InsuranceDetail: id, packetId, provider, memberId, groupNumber, cardFrontUrl, cardBackUrl, photoIdUrl, createdAt, updatedAt
  - ReviewNote: id, packetId, reviewerId, decision, comment, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Render and evaluate conditional form logic so questions show or hide based on prior answers
  - Generate a unique secure access token when a packet is assigned to a patient
  - Persist partial form progress for save-and-resume and mark completion
  - Capture e-signatures with signer name, timestamp, and IP into an immutable consent record
  - Run completeness checks that block submission until required fields and consents are done
  - Move packets through the status workflow and surface them in the front-desk review queue
  - Record review decisions (approve, reject, request correction) and notify the patient by mock notification
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 2 clinics, 4 reusable form templates with conditional logic, 3 consent documents, ~8 intake packets across sent/in-progress/submitted/approved states, 1 admin, 2 front-desk staff, and 5 patients. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
