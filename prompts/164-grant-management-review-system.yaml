backend_logic:
- Publish funding opportunities and enforce open/close windows that lock submissions after the deadline
- Assign proposals to review panelists and flag declared conflicts of interest
- Aggregate weighted rubric scores across panelists into a ranked applicant list
- Drive the decision workflow (shortlist, award, decline) and notify applicants by mock notification
- Schedule and track disbursement milestones against each award
- Collect and review periodic impact reports tied to awarded grants
- Compute program totals of requested, committed, and disbursed funds for the officer dashboard
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Applicant — browse opportunities, submit proposals, and report on awarded grants
- Program Officer — post opportunities, manage applications, and track disbursements
- Review Panelist — score assigned proposals against rubrics and leave comments
- Admin — manage users, funding programs, and rubrics
