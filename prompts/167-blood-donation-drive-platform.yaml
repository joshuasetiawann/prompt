backend_logic:
- Schedule drives and generate appointment slots with per-slot capacity
- Book, reschedule, and cancel appointments while enforcing per-slot capacity limits
- Score the pre-screening questionnaire and apply deferral rules to accept, temporarily defer, or permanently defer a donor
- Enforce the minimum donation interval and active deferrals when a donor attempts to book
- Record a completed donation, create blood units, and increment stock by blood type
- Track blood unit expiry and raise low-stock alerts per blood type
- Compute each donor's next eligible donation date and surface it in the portal
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Donor — register, complete eligibility pre-screening, book appointment slots, and view donation history
- Screening Staff — run eligibility questionnaires, record deferrals, and confirm donations
- Drive Coordinator — schedule drives, manage appointment slots, and monitor blood stock by type
- Admin — manage users, centers, and reports
