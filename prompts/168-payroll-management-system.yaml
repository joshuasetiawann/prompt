ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds payroll and compensation products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: PayCadence Payroll & Payslip Management System
  Type: Payroll & Payslip Management System (Payroll & Compensation)
  Target users: payroll administrators and finance teams who run pay cycles, route approvals, and generate payslips and employees who view pay history and download payslips.
  Business goal: Let payroll teams run pay cycles end to end by calculating gross-to-net with tax and statutory deductions, routing runs for approval, generating downloadable payslips, and giving employees a self-service pay history portal.

  BRAND & DESIGN
  Brand style: precise, professional, reassuring. Colors: deep teal, slate grey, crisp white. A pay-run console with a gross-to-net breakdown table and a payslip preview panel. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Payroll dashboard with current cycle and pending approvals
  2. Employee compensation setup (salary, allowances, deductions)
  3. Pay run wizard (period, employees, calculations)
  4. Pay run review with gross-to-net breakdown
  5. Approval queue for pay runs
  6. Payslip detail and PDF download
  7. Employee portal: pay history and payslips
  8. Pay components and tax table configuration
  9. Auth (sign in / register)
  10. Admin: users, components, and payroll reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Payroll Administrator — set up employees, run pay cycles, and generate payslips
  - Approver — review and approve or reject pay runs before disbursement
  - Employee — view pay history and download payslips
  - Admin — manage users, pay components, and tax tables

  CORE FEATURES
  - Employee compensation profiles with base salary, recurring allowances, and deductions
  - Pay cycle creation per period with selection of which employees to include
  - Gross-to-net calculation engine applying earnings, tax brackets, and statutory deductions
  - Configurable pay components (earnings and deductions) and tax tables
  - Multi-step approval workflow routing pay runs through draft, pending, approved, and paid states
  - Payslip generation with a downloadable PDF per employee per period
  - Off-cycle adjustments and one-time bonuses or deductions within a run
  - Employee self-service portal with pay history and payslip downloads
  - Payroll register and statutory deduction reports per period

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - Employee: id, userId, employeeNumber, baseSalary, payFrequency, taxCode, status, createdAt, updatedAt
  - PayComponent: id, name, type, calcMethod, rate, taxable, createdAt, updatedAt
  - PayRun: id, period, payDate, status, approvedById, approvedAt, totalGross, totalNet, createdAt, updatedAt
  - Payslip: id, payRunId, employeeId, grossPay, totalDeductions, netPay, status, createdAt, updatedAt
  - PayslipLine: id, payslipId, componentId, label, amount, kind, createdAt, updatedAt
  - TaxBracket: id, name, lowerBound, upperBound, rate, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Assemble a pay run for a period by collecting included employees and their compensation profiles
  - Calculate gross pay from base salary and earnings components for each employee
  - Apply tax brackets and statutory deductions to compute total deductions and net pay
  - Generate per-employee payslips with itemized earning, deduction, and tax lines
  - Route pay runs through draft, pending approval, approved, and paid states with approver actions
  - Render and store downloadable payslip PDFs once a run is approved
  - Aggregate payroll register and statutory deduction totals per pay run for reporting
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 1 company with ~15 employees on a monthly pay frequency, configured earning and deduction components, tax brackets, 2 completed pay runs with generated payslips and a current draft run pending approval, 1 admin, 1 approver, 1 payroll administrator, and several employee logins. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
