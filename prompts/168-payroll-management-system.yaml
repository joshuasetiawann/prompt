backend_logic:
- Assemble a pay run for a period by collecting included employees and their compensation profiles
- Calculate gross pay from base salary and earnings components for each employee
- Apply tax brackets and statutory deductions to compute total deductions and net pay
- Generate per-employee payslips with itemized earning, deduction, and tax lines
- Route pay runs through draft, pending approval, approved, and paid states with approver actions
- Render and store downloadable payslip PDFs once a run is approved
- Aggregate payroll register and statutory deduction totals per pay run for reporting
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Payroll Administrator — set up employees, run pay cycles, and generate payslips
- Approver — review and approve or reject pay runs before disbursement
- Employee — view pay history and download payslips
- Admin — manage users, pay components, and tax tables
env_payments: true
env_ai: false
seed_data: '- Seed realistic demo data: 1 company with ~15 employees on a monthly pay frequency, configured earning and deduction components, tax brackets, 2 completed pay runs with generated payslips and a current draft run pending approval, 1 admin, 1 approver, 1 payroll administrator, and several employee logins. Provide a seed script and list the demo login credentials in the README.'
