ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds lending and loan servicing products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: LendLedger Loan Origination & Servicing System
  Type: Loan Origination & Servicing System (Lending & Loan Servicing)
  Target users: loan officers and underwriters who decision applications, disburse loans, and manage arrears and borrowers who apply for loans and track their repayment schedules.
  Business goal: Take borrowers from application and credit-decisioning through disbursement, then auto-generate amortization schedules, track repayments and arrears, and run delinquency follow-ups from one lender back office.

  BRAND & DESIGN
  Brand style: credible, structured, modern. Colors: deep green, charcoal, soft white. A loan pipeline board beside an amortization schedule table and an arrears aging panel. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Lending dashboard with pipeline and arrears summary
  2. Loan application intake form
  3. Underwriting review and credit decision
  4. Loan detail with amortization schedule
  5. Disbursement and loan activation
  6. Repayments recording and ledger
  7. Arrears and delinquency follow-up queue
  8. Borrower portal: my loans, schedule, and balance
  9. Auth (sign in / register)
  10. Admin: loan products, rates, and reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Loan Officer — intake applications, disburse approved loans, and manage borrower accounts
  - Underwriter — review applications, run credit decisioning, and approve or decline
  - Borrower — apply for loans and track repayment schedules and balances
  - Admin — manage users, loan products, and reports

  CORE FEATURES
  - Loan product catalog with interest rate, term, and fee configuration
  - Borrower application intake capturing requested amount, term, and income details
  - Credit-decisioning with a configurable scoring/rules check producing approve, decline, or refer outcomes
  - Disbursement that activates a loan and generates an amortization schedule of installments
  - Amortization schedule generation with a principal-and-interest split per installment
  - Repayment recording that allocates payments across due installments and updates outstanding balance
  - Arrears detection and delinquency aging with overdue installment tracking
  - Delinquency follow-up workflow with reminders and status notes (mock notifications)
  - Borrower self-service portal showing schedule, balance, and payment history

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - LoanProduct: id, name, interestRate, termMonths, maxAmount, fees, status, createdAt, updatedAt
  - LoanApplication: id, borrowerId, productId, requestedAmount, termMonths, statedIncome, creditScore, decision, decidedById, decidedAt, status, createdAt, updatedAt
  - Loan: id, applicationId, borrowerId, principal, interestRate, termMonths, disbursedAt, outstandingBalance, status, createdAt, updatedAt
  - Installment: id, loanId, sequence, dueDate, principalDue, interestDue, amountDue, amountPaid, status, createdAt, updatedAt
  - Repayment: id, loanId, amount, paidAt, method, allocatedTo, createdAt, updatedAt
  - DelinquencyAction: id, loanId, type, daysPastDue, note, createdById, actionedAt, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Run credit decisioning against configurable scoring rules to produce approve, decline, or refer outcomes
  - Disburse an approved loan and generate its amortization schedule of principal-and-interest installments
  - Record repayments and allocate them across the oldest due installments, updating outstanding balance
  - Detect overdue installments and compute days-past-due and arrears aging buckets
  - Drive a delinquency follow-up workflow with reminder actions and status notes (mock notifications)
  - Recalculate outstanding balance and loan status (active, in arrears, closed) as repayments post
  - Aggregate portfolio metrics for reports: disbursed, outstanding, and arrears by aging bucket
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 3 loan products with rates and terms, ~20 borrower applications across approved/declined/referred decisions, ~12 active loans with generated amortization schedules, recorded repayments, several loans in arrears across aging buckets, delinquency follow-up actions, 1 admin, 2 loan officers, 1 underwriter, and 6 borrowers. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
