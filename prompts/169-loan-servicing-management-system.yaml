backend_logic:
- Run credit decisioning against configurable scoring rules to produce approve, decline, or refer outcomes
- Disburse an approved loan and generate its amortization schedule of principal-and-interest installments
- Record repayments and allocate them across the oldest due installments, updating outstanding balance
- Detect overdue installments and compute days-past-due and arrears aging buckets
- Drive a delinquency follow-up workflow with reminder actions and status notes (mock notifications)
- Recalculate outstanding balance and loan status (active, in arrears, closed) as repayments post
- 'Aggregate portfolio metrics for reports: disbursed, outstanding, and arrears by aging bucket'
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Loan Officer — intake applications, disburse approved loans, and manage borrower accounts
- Underwriter — review applications, run credit decisioning, and approve or decline
- Borrower — apply for loans and track repayment schedules and balances
- Admin — manage users, loan products, and reports
env_payments: true
