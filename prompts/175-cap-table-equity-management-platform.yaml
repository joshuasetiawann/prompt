- .env.example
- README.md with setup and run commands
- Dockerfile
- docker-compose.yml when useful
- Unit and integration test examples
required_pages:
- Cap table overview with ownership by stakeholder and class
- Stakeholders directory (founders, employees, investors)
- Security issuance (shares, options, SAFEs, convertible notes)
- Option grant detail with vesting schedule
- Grant approval queue
- Funding round and dilution modeling
- 'Stakeholder portal: my holdings and vesting'
- Share classes and equity pool setup
