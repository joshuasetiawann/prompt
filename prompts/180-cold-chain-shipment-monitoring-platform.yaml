backend_logic:
- Ingest time-series temperature readings for a shipment's sensor and persist them in recorded order
- Detect excursions when readings breach the profile's min/max for longer than the allowed duration
- Open excursion records with peak temperature and duration and route them through a disposition workflow
- Raise alerts on open excursions and on sensor issues such as low battery or overdue calibration
- Append chain-of-custody handoff events with party, type, location, and timestamp
- Compute mean kinetic temperature and total time-out-of-range per shipment
- Compile an exportable compliance document bundling readings, excursions, dispositions, and custody for a shipment
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Logistics Coordinator — create shipments, assign sensors and drivers, and monitor live readings
- Quality & Compliance Officer — review excursions, set dispositions, and export compliance documentation
- Delivery Driver — record custody handoffs and confirm delivery in the field
- Admin — manage users, sensors, and product temperature profiles
