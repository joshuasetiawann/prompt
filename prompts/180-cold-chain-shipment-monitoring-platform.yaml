ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds cold chain and temperature-compliance products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: ColdGuard Cold Chain Shipment Monitoring Platform
  Type: Cold Chain Shipment Monitoring Platform (Cold Chain & Temperature Compliance)
  Target users: logistics coordinators and quality officers who monitor temperature-controlled shipments and review excursions and delivery drivers who record custody handoffs in the field.
  Business goal: Monitor temperature-controlled shipments with time-series sensor readings, excursion alerts, chain-of-custody logs, and exportable compliance documentation for perishable and pharma freight.

  BRAND & DESIGN
  Brand style: precise, clinical, vigilant. Colors: arctic blue, white, alert red. A time-series temperature chart with excursion bands beside a chain-of-custody timeline and a compliance document export. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Monitoring dashboard (active shipments, live temps, open excursions)
  2. Shipment list and detail (route, sensor, and status)
  3. Create shipment (assign product profile, sensor, and driver)
  4. Live temperature chart and reading history
  5. Excursion review and disposition
  6. Chain-of-custody timeline and handoff log
  7. Sensor and device registry
  8. Compliance document export
  9. Auth (sign in / register)
  10. Admin: users, sensors, and temperature profiles

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Logistics Coordinator — create shipments, assign sensors and drivers, and monitor live readings
  - Quality & Compliance Officer — review excursions, set dispositions, and export compliance documentation
  - Delivery Driver — record custody handoffs and confirm delivery in the field
  - Admin — manage users, sensors, and product temperature profiles

  CORE FEATURES
  - Shipment creation assigning a product temperature profile, a sensor device, and a driver
  - Time-series temperature reading ingestion from sensors with live charting
  - Excursion detection when readings breach the profile's min/max thresholds beyond the allowed duration
  - Excursion alerts and a disposition workflow (investigate, accept, reject)
  - Chain-of-custody logging of handoffs between parties with timestamp and location
  - Product temperature profiles defining allowed range and maximum excursion duration
  - Sensor registry with calibration date and battery status
  - Mean kinetic temperature and time-out-of-range computed per shipment
  - Exportable compliance documentation bundling readings, excursions, and custody for a shipment

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - TemperatureProfile: id, name, productType, minTempC, maxTempC, maxExcursionMinutes, createdAt, updatedAt
  - Sensor: id, deviceId, model, calibrationDate, batteryStatus, status, createdAt, updatedAt
  - Shipment: id, referenceCode, profileId, sensorId, driverId, origin, destination, status, departedAt, deliveredAt, createdAt, updatedAt
  - SensorReading: id, shipmentId, sensorId, temperatureC, recordedAt, createdAt, updatedAt
  - Excursion: id, shipmentId, startReadingId, endReadingId, peakTempC, durationMinutes, disposition, createdAt, updatedAt
  - CustodyEvent: id, shipmentId, fromParty, toParty, handoffType, location, occurredAt, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Ingest time-series temperature readings for a shipment's sensor and persist them in recorded order
  - Detect excursions when readings breach the profile's min/max for longer than the allowed duration
  - Open excursion records with peak temperature and duration and route them through a disposition workflow
  - Raise alerts on open excursions and on sensor issues such as low battery or overdue calibration
  - Append chain-of-custody handoff events with party, type, location, and timestamp
  - Compute mean kinetic temperature and total time-out-of-range per shipment
  - Compile an exportable compliance document bundling readings, excursions, dispositions, and custody for a shipment
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: ~10 shipments across in-transit, delivered, and flagged statuses, product temperature profiles for perishable and pharma goods, ~8 sensors with calibration and battery status, dense time-series readings including some excursions, opened excursions with dispositions, chain-of-custody handoff timelines, a compliance export, 1 admin, 2 logistics coordinators, 1 quality officer, and 2 drivers. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
