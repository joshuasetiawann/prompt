backend_logic:
- Schedule inspections by assigning an inspector, site, date, and checklist template
- Instantiate checklist items from the selected template when an inspection starts
- Record per-item pass/fail/N-A results with notes and photo evidence
- Compute the overall pass/fail outcome from the results of required items
- Auto-generate a client-facing inspection report from completed items and findings
- Publish reports to the assigning client and gate access to that client's records
- Advance inspection status and queue re-inspections for failed items
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Inspection Coordinator — schedule inspections, assign inspectors, and review reports
- Field Inspector — complete mobile checklists with photos and notes on site
- Client/Property Owner — view assigned reports and inspection outcomes
- Admin — manage users, clients, and checklist templates
