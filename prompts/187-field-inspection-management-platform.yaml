ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds field inspection and compliance products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: SiteProof Field Inspection Management Platform
  Type: Field Inspection Management Platform (Field Inspections & Compliance)
  Target users: inspection coordinators who schedule site visits and assign inspectors and field inspectors who complete mobile checklist templates with photos and notes on site.
  Business goal: Let coordinators schedule site inspections and assign inspectors, inspectors complete mobile checklist templates with photos and notes, and the platform auto-generate pass/fail inspection reports for clients.

  BRAND & DESIGN
  Brand style: rigorous, clear, field-ready. Colors: inspection blue, slate grey, pass-green and fail-red accents. A mobile checklist with photo capture beside a scheduling calendar and an auto-generated pass/fail report. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Dashboard (upcoming inspections, in-progress, and reports awaiting review)
  2. Inspection scheduling calendar (assign inspector, site, and template)
  3. Inspection detail (checklist progress, photos, notes, status)
  4. Mobile inspection runner (complete checklist items with photos and notes)
  5. Checklist template builder (sections and pass/fail items)
  6. Inspection reports (auto-generated pass/fail with findings)
  7. Client portal (view assigned reports and history)
  8. Sites and properties directory
  9. Auth (sign in / register)
  10. Admin: users, clients, and templates

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Inspection Coordinator — schedule inspections, assign inspectors, and review reports
  - Field Inspector — complete mobile checklists with photos and notes on site
  - Client/Property Owner — view assigned reports and inspection outcomes
  - Admin — manage users, clients, and checklist templates

  CORE FEATURES
  - Inspection scheduling assigning an inspector, site, date, and checklist template
  - Reusable checklist templates with sections and pass/fail/N-A items
  - Mobile checklist runner capturing per-item result, photos, and notes
  - Automatic pass/fail determination from item results and required criteria
  - Auto-generated inspection report with findings, photos, and overall outcome
  - Client portal exposing only that client's reports and inspection history
  - Inspection status lifecycle from scheduled through in progress, completed, and reviewed
  - Photo evidence attached to individual checklist items
  - Re-inspection scheduling for failed items

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, role, createdAt, updatedAt
  - Client: id, name, contactEmail, contactPhone, createdAt, updatedAt
  - Site: id, clientId, name, address, siteType, createdAt, updatedAt
  - ChecklistTemplate: id, name, category, sections, active, createdAt, updatedAt
  - Inspection: id, siteId, inspectorId, templateId, scheduledAt, status, outcome, completedAt, createdAt, updatedAt
  - InspectionItem: id, inspectionId, sectionLabel, prompt, result, note, photoUrl, required, createdAt, updatedAt
  - Report: id, inspectionId, summary, outcome, findingsCount, pdfUrl, publishedAt, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Schedule inspections by assigning an inspector, site, date, and checklist template
  - Instantiate checklist items from the selected template when an inspection starts
  - Record per-item pass/fail/N-A results with notes and photo evidence
  - Compute the overall pass/fail outcome from the results of required items
  - Auto-generate a client-facing inspection report from completed items and findings
  - Publish reports to the assigning client and gate access to that client's records
  - Advance inspection status and queue re-inspections for failed items
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: ~4 clients with sites, 3 checklist templates with sections and pass/fail items, ~18 inspections across scheduled, in progress, completed, and reviewed statuses with item results and photos, auto-generated reports including some failures, 1 admin, 2 coordinators, 3 inspectors, and 2 client users. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
