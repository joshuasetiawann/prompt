backend_logic:
- Compute the next renewal date for each subscription from its billing cycle
- Generate renewal and trial-expiry reminders ahead of upcoming charges
- Detect and record a price change whenever a subscription's amount is updated
- Aggregate spend by category with monthly and annualized normalized totals
- Build an upcoming-bills calendar across all household subscriptions and bills
- Invite household members as payer or viewer and enforce that role on edits
- Advance subscription status through active, paused, and cancelled
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Household Owner — manage the household, members, and roles
- Payer — add and manage subscriptions and bills they pay
- Viewer — view subscriptions, bills, and spend breakdowns
env_payments: false
env_ai: false
