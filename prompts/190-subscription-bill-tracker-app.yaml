ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds personal-finance utility products, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: BillRadar Subscription & Bill Tracker App
  Type: Subscription & Bill Tracker App (Subscription & Bill Tracking)
  Target users: households tracking recurring subscriptions and bills together and members invited as payers or viewers of the shared household.
  Business goal: Let households track recurring subscriptions and bills with renewal reminders, free-trial expiry alerts, price-change detection, and category spend breakdowns across payer and viewer roles.

  BRAND & DESIGN
  Brand style: tidy, reassuring, money-smart. Colors: mint green, deep navy, off-white. A subscription list with renewal countdowns beside a category spend donut and an upcoming-bills calendar. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Dashboard (upcoming renewals, monthly recurring total, trial-expiry alerts)
  2. Subscriptions list (status, cost, billing cycle, next renewal)
  3. Subscription detail (price history, renewal schedule, notes)
  4. Add / edit subscription or bill
  5. Bills calendar (upcoming charges by date)
  6. Spend breakdown by category (charts)
  7. Free-trial tracker (trials and expiry countdowns)
  8. Household members and roles
  9. Auth (sign in / register)
  10. Settings (reminder and notification preferences)

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Household Owner — manage the household, members, and roles
  - Payer — add and manage subscriptions and bills they pay
  - Viewer — view subscriptions, bills, and spend breakdowns

  CORE FEATURES
  - Recurring subscription and bill tracking with cost, cycle, and next-renewal date
  - Renewal reminders ahead of each upcoming charge (mock notification log)
  - Free-trial tracking with expiry-date countdowns and alerts before conversion
  - Price-change detection that records and flags cost changes over time
  - Category spend breakdowns with monthly and annualized normalized totals
  - Upcoming-bills calendar aggregating charges across subscriptions and bills
  - Shared household with members invited as payer or viewer
  - Active, paused, and cancelled subscription lifecycle

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, createdAt, updatedAt
  - Household: id, ownerId, name, currency, createdAt, updatedAt
  - Membership: id, householdId, userId, role, createdAt, updatedAt
  - Category: id, householdId, name, color, createdAt, updatedAt
  - Subscription: id, householdId, categoryId, name, itemType, amount, billingCycle, nextRenewalDate, status, isTrial, trialEndsAt, createdAt, updatedAt
  - PriceChange: id, subscriptionId, oldAmount, newAmount, changedAt, createdAt, updatedAt
  - Reminder: id, subscriptionId, remindAt, reminderType, sentAt, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Compute the next renewal date for each subscription from its billing cycle
  - Generate renewal and trial-expiry reminders ahead of upcoming charges
  - Detect and record a price change whenever a subscription's amount is updated
  - Aggregate spend by category with monthly and annualized normalized totals
  - Build an upcoming-bills calendar across all household subscriptions and bills
  - Invite household members as payer or viewer and enforce that role on edits
  - Advance subscription status through active, paused, and cancelled
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 1 household with ~18 subscriptions and bills across categories, a mix of active, paused, and cancelled items on monthly and annual cycles, a few free trials with expiry dates, recorded price changes, generated renewal reminders, 1 owner payer, 1 additional payer, and 1 viewer. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
