ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds campsite and RV park reservation systems, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: PitchPoint Campsite & RV Park Reservation System
  Type: Campsite & RV Park Reservation System (Camping & RV Reservations)
  Target users: campers and RV travelers booking nightly site stays and park operators managing sites, hookups, and seasonal rates.
  Business goal: Let campers search parks, pick a site with the right hookups for their dates, and pay to confirm, while operators manage sites, availability, and pricing.

  BRAND & DESIGN
  Brand style: rugged, outdoorsy, welcoming. Colors: forest green, sand, clay orange. Map-and-grid site selector layered over a date-range availability strip. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Home with park search by location, dates, and rig type
  2. Park search results with filters (hookups, site type, amenities, price)
  3. Park detail with site map, amenities, rules, and photo gallery
  4. Site availability calendar and date-range picker
  5. Reservation checkout (nights, guests, add-ons, mock payment)
  6. Camper trips dashboard with upcoming and past reservations
  7. Reservation detail with check-in info, rules, and cancellation policy
  8. Auth (sign in / sign up / role selection)
  9. Operator dashboard: parks, sites, calendar, and reservation inbox
  10. Admin: parks, operators, payouts, and reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Camper — search parks, book sites for date ranges, manage trips
  - Park Operator — manage parks, sites, hookups, pricing, and reservations
  - Admin — oversee parks, operators, payouts, and platform settings

  CORE FEATURES
  - Park and site search filtered by hookups, rig length, site type, and amenities
  - Date-range availability with per-night pricing and minimum-stay rules
  - Site map selector showing pull-through, back-in, and tent sites
  - Seasonal and weekend dynamic pricing with add-ons (firewood, extra vehicle)
  - Reservation engine that prevents overlapping date ranges on the same site
  - Deposit or full-payment checkout with cancellation-policy enforcement
  - Camper trip management with modify, extend, and cancel flows
  - Operator occupancy calendar and reservation inbox with check-in status

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, phone, rigType, rigLength, role, createdAt, updatedAt
  - Park: id, operatorId, name, description, address, latitude, longitude, amenities, rules, photos, status, createdAt, updatedAt
  - Site: id, parkId, label, siteType, hookups, maxRigLength, maxGuests, baseNightlyRate, createdAt, updatedAt
  - RatePeriod: id, parkId, name, startDate, endDate, multiplier, minNights, createdAt, updatedAt
  - Reservation: id, siteId, camperId, checkInDate, checkOutDate, guests, addOns, totalAmount, depositAmount, status, createdAt, updatedAt
  - Payment: id, reservationId, amount, kind, status, createdAt, updatedAt
  - Review: id, reservationId, parkId, camperId, rating, comment, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Park and site search combining geo location, dates, hookups, rig length, and amenity filters
  - Date-range availability resolver that excludes sites with overlapping reservations for the requested nights
  - Overlap-checking reservation engine that rejects bookings whose date ranges intersect an existing stay on the same site
  - Nightly pricing calculator applying seasonal rate periods, minimum-stay rules, and add-on charges
  - Checkout that records a deposit or full Payment and confirms the reservation on success
  - Cancellation handler that applies the park's policy and computes any refund
  - Operator occupancy calendar builder and post-stay review aggregation
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Payments: implement a mock checkout/deposit that records a Payment status; structure it to swap in a real gateway (e.g., Stripe) via env vars.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 6 parks with ~70 sites, ~30 rate periods, 22 reservations across past and future date ranges, 8 reviews, 1 admin, 2 park operators, and 4 campers. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
