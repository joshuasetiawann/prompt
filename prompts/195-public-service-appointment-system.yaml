backend_logic:
- Slot generator that materializes bookable AppointmentSlots from weekly SlotTemplates per office and service
- Availability resolver that surfaces only slots whose bookedCount is below capacity for a date range
- Booking engine that atomically increments bookedCount and rejects when a slot reaches capacity to prevent over-booking
- Reference-number and QR generation with check-in that pushes the appointment into the office queue
- 'Queue console operations: call next, assign counter, mark served, and record no-shows'
- Reschedule and cancel handler that decrements the old slot and books the new one in one transaction
- Reporting that computes capacity utilization, average wait time, and no-show rates per office and service
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Resident — find services, book and manage appointments, check in
- Agency Staff — manage queues, call next, and handle walk-ins
- Office Admin — configure services, offices, slots, and staff
