ready_to_use_prompt: |-
  You are a senior full-stack engineer who builds public service appointment booking systems, building a production-grade full-stack app scaffold with local run support and deployment readiness. Build the complete application now. Do not ask any questions — every detail below is already decided.

  STANDARD
  Deliver a production-grade full-stack app scaffold with local run support and deployment readiness: the app must run end-to-end locally on seed data with mock modes and no paid API keys, and be structured for deployment with security, testing, and real-service integration guidance. This is a scaffold — going live still requires your own credentials, provider setup, migrations on a real database, and a security review. Do not assume it is live without that setup.

  APP
  Name: CivicSlot Public Service Appointment Booking System
  Type: Public Service Appointment Booking System (Public Sector Appointments)
  Target users: residents booking appointments for public services and agency staff managing service desks, slots, and queues.
  Business goal: Let residents find the right service and office, book an available appointment slot, and check in on arrival, while staff manage capacity, queues, and walk-ins.

  BRAND & DESIGN
  Brand style: accessible, trustworthy, official. Colors: government blue, white, high-contrast charcoal. Step-by-step service wizard beside a calendar of bookable counter slots. Use Tailwind + shadcn/ui, consistent spacing, rounded cards, accessible contrast. Mobile-first and fully responsive across mobile, tablet, and desktop.

  TECH STACK
  - Next.js (App Router) with TypeScript, Tailwind CSS, and shadcn/ui
  - Prisma ORM; PostgreSQL for production, with SQLite supported for local development
  - Auth.js (or secure hashed email/password) wherever accounts and roles are needed
  - Zod and React Hook Form for both client-side and server-side validation
  - Vercel-ready and Docker-ready

  PAGES / SCREENS
  1. Home with service category search and office locator
  2. Service detail with requirements, documents needed, and locations
  3. Office and slot picker with calendar of available appointment times
  4. Appointment booking wizard (service, details, document checklist)
  5. Confirmation page with reference number and QR check-in code
  6. Resident dashboard: upcoming and past appointments with reschedule and cancel
  7. Auth (sign in / sign up / guest booking)
  8. Staff queue console: today's appointments, call next, and walk-ins
  9. Admin: services, offices, and slot template configuration
  10. Admin: capacity, no-show, and wait-time reports

  NAVIGATION
  - Real, working navigation (a top bar or sidebar as fits the app); every item routes to one of the pages above with no dead links; show only menu items the current role may use; clear active state; collapse to a mobile menu on small screens.

  USER ROLES
  - Resident — find services, book and manage appointments, check in
  - Agency Staff — manage queues, call next, and handle walk-ins
  - Office Admin — configure services, offices, slots, and staff

  CORE FEATURES
  - Service catalog with required-document checklists and eligibility notes
  - Office locator with per-office service offerings and hours
  - Slot generation from staffed counter templates with per-service durations
  - Appointment booking that holds and confirms a single available slot
  - Conflict prevention so a slot cannot be booked by two residents
  - QR or reference-based check-in feeding a live staff queue console
  - Reschedule, cancel, and no-show handling that frees the slot
  - Capacity, wait-time, and no-show reporting for admins

  DATABASE MODELS (Prisma — PostgreSQL in production, SQLite locally)
  - User: id, email, passwordHash, name, phone, nationalIdRef, role, createdAt, updatedAt
  - Service: id, name, description, category, durationMinutes, requiredDocuments, isActive, createdAt, updatedAt
  - Office: id, name, address, openingHours, counterCount, timezone, createdAt, updatedAt
  - SlotTemplate: id, officeId, serviceId, weekday, startTime, endTime, capacityPerSlot, createdAt, updatedAt
  - AppointmentSlot: id, officeId, serviceId, slotDate, startTime, endTime, capacity, bookedCount, createdAt, updatedAt
  - Appointment: id, slotId, residentId, serviceId, referenceNumber, status, checkedInAt, calledAt, createdAt, updatedAt
  - QueueEntry: id, appointmentId, officeId, ticketNumber, counter, status, createdAt, updatedAt
  - Define explicit Prisma relations between these models (one-to-many and many-to-one per the foreign keys), with sensible indexes and cascade rules; include createdAt and updatedAt; generate and commit migrations.

  BACKEND / API LOGIC
  - Slot generator that materializes bookable AppointmentSlots from weekly SlotTemplates per office and service
  - Availability resolver that surfaces only slots whose bookedCount is below capacity for a date range
  - Booking engine that atomically increments bookedCount and rejects when a slot reaches capacity to prevent over-booking
  - Reference-number and QR generation with check-in that pushes the appointment into the office queue
  - Queue console operations: call next, assign counter, mark served, and record no-shows
  - Reschedule and cancel handler that decrements the old slot and books the new one in one transaction
  - Reporting that computes capacity utilization, average wait time, and no-show rates per office and service
  - Validate every mutation on the server with Zod; enforce role-based authorization; protect all private routes; scope every query to the current user/tenant so no one can read or modify another user's records.

  ENVIRONMENT & MODES
  - Provide a complete .env.example documenting every variable.
  - Local mode runs fully on seed data with mock modes and no paid keys.
  - Notifications: log mock email/SMS locally; structure the provider so a real one can be added via env vars without code changes elsewhere.

  SEED DATA
  - Seed realistic demo data: 4 offices, 9 services, ~60 slot templates generating ~300 appointment slots, 35 appointments across past and future dates, 1 admin, 3 agency staff, and 6 residents. Provide a seed script and list the demo login credentials in the README.

  UX REQUIREMENTS
  - Every data view has loading, empty, error, and success states.
  - All forms validate on client and server with inline messages and clear success/error feedback.
  - Realistic, human copywriting throughout — no dummy filler text.

  SECURITY
  - Keep all secrets in environment variables (never in code). Apply role-based access control where roles exist, protect private routes, handle any file uploads safely, add rate-limiting guidance for public endpoints, and write audit logs for sensitive actions where relevant.

  TESTING
  - Include unit test examples for the core logic and integration test examples for the most important flows, plus a manual QA checklist and a production smoke-test checklist.

  DEPLOYMENT
  - Include a Dockerfile (and docker-compose where useful), the production build and database-migration commands, Vercel deployment notes, and a post-deployment smoke test.

  DELIVERABLES
  - Create every file needed to run locally and to deploy: the full Next.js App Router structure, the Prisma schema and migrations, a seed script, .env.example, a README with exact copy-paste setup commands (install, prisma generate and migrate, seed, dev), a Dockerfile, and test examples.
  - Build only real, working screens: functional navigation, working forms, no dead buttons, no unfinished screens, no dummy filler, no leftover task comments, and no unresolved template tokens.

  ACCEPTANCE CHECKLIST — the app must pass all of these
  - Installs and runs locally with the documented commands, on seed data, with no paid keys.
  - Builds successfully and migrates the database successfully.
  - Every page renders and is reachable from the navigation.
  - Forms validate on client and server; protected routes are protected; role permissions work.
  - Admin pages work where included; mock modes work without paid keys; real-provider setup is documented.
  - Loading, empty, error, and success states are present; responsive layout works.
  - No unresolved template tokens or dummy filler remains; no dead buttons or dead links remain.
  - README setup steps and production deployment steps are complete.
