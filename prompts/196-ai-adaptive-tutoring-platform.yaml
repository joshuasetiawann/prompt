backend_logic:
- Adaptive difficulty selection that picks the next lesson from mastery records and recent session scores
- AI tutor chat that calls an AI provider behind one interface to give Socratic hints and step-by-step explanations scoped to the current lesson
- Auto-generated quiz and question creation per skill via the AI interface
- Mastery scoring that updates skill levels and schedules spaced-repetition review dates after each session
- Personalized study-plan generation that sequences lessons toward a learner's goal
- Knowledge-gap detection that flags weak skills from session history
- Educator analytics aggregation across a class for progress, mastery, and time on task
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Learner — take adaptive lessons, chat with the tutor, and track mastery
- Educator — assign content, monitor progress, and review struggling topics
- Admin — manage users, subjects, and platform usage
