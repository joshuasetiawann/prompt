backend_logic:
- Feedback ingestion and normalization from multiple sources into a unified feed
- Sentiment classification that calls an AI provider behind one interface to score each feedback item's sentiment and intensity
- Theme and topic clustering that groups feedback into themes and extracts keywords via the AI interface
- Automatic tagging and theme assignment with per-item confidence scores
- Trend aggregation that computes sentiment and theme volume over time windows
- Urgent-issue detection that raises alerts for negative or high-severity feedback
- Response-draft suggestion generation for individual feedback items via the AI interface
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
