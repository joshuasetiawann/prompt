required_pages:
- Dashboard (upcoming and past trips)
- Trip overview (dates, destinations, and budget summary)
- Day-by-day itinerary builder (per-day activity timeline)
- Activity editor (time, location, category, notes, and estimated cost)
- Bookings (flights, lodging, and transport with confirmation details)
