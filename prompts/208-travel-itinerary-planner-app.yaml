backend_logic:
- Generate trip-day records spanning the trip's start and end dates and renumber them when the dates change
- Order activities within each day by start time and flag conflicts when two activities overlap
- Reschedule an activity to a different day or time and reorder the affected day timelines
- Geocode activity and destination locations into coordinates for the map view using a mock geocoder locally
- Aggregate planned and actual costs across activities, bookings, and budget entries into category totals and a remaining-budget figure
- Compile a chronological trip overview merging activities and bookings across all days
- Invite companions to a trip as editor or viewer and enforce that role on itinerary and booking edits
- Server-side validation on every mutation with Zod
- Role-based authorization and protected routes for private pages
- Scope every query to the current user/tenant (no cross-user data access)
user_roles:
- Owner — create trips, build itineraries, manage the budget, and invite companions
- Editor — add and edit days, activities, and bookings on shared trips
- Viewer — view the itinerary, map, and bookings without editing
